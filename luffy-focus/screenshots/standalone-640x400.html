<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=640, initial-scale=1.0">
<title>Luffy Focus — Screenshot</title>
<style>
@font-face {
  font-family: 'Press Start 2P';
  src: url('../assets/fonts/PressStart2P.woff2') format('woff2');
  font-weight: 400;
  font-style: normal;
}

/* ===== Design Tokens (same as popup.css) ===== */
:root {
  --color-surface: #f7f9ff;
  --color-surface-dim: #d7dadf;
  --color-surface-bright: #f7f9ff;
  --color-surface-container-lowest: #ffffff;
  --color-surface-container-low: #f1f4f9;
  --color-surface-container: #ebeef3;
  --color-surface-container-high: #e5e8ee;
  --color-surface-container-highest: #e0e3e8;
  --color-on-surface: #181c20;
  --color-on-surface-variant: #5e3f39;
  --color-outline: #936e68;
  --color-outline-variant: #e9bcb5;
  --color-primary: #b60b00;
  --color-on-primary: #ffffff;
  --color-primary-container: #e41000;
  --color-on-primary-container: #fff7f6;
  --color-secondary: #7a5900;
  --color-on-secondary: #ffffff;
  --color-secondary-container: #fcbc0b;
  --color-on-secondary-container: #6b4e00;
  --color-tertiary: #004cd9;
  --color-on-tertiary: #ffffff;
  --color-tertiary-container: #2765ff;
  --color-on-tertiary-container: #faf8ff;
  --color-success: #92cc41;
  --color-error: #e76e55;
  --color-warning: #f7d51d;
  --color-disabled: #bcbcbc;
  --color-background: #f7f9ff;
  --color-on-background: #181c20;
  --space-unit: 4px;
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --space-gutter: 16px;
  --font-pixel: 'Press Start 2P', monospace;
  --fs-display-lg: 24px;
  --lh-display-lg: 32px;
  --fs-headline-md: 14px;
  --lh-headline-md: 20px;
  --fs-body-base: 11px;
  --lh-body-base: 18px;
  --fs-label-caps: 9px;
  --lh-label-caps: 12px;
  --border-width: 4px;
  --border-color: #181c20;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: 640px;
  height: 400px;
  font-family: var(--font-pixel);
  font-size: var(--fs-body-base);
  line-height: var(--lh-body-base);
  color: var(--color-on-background);
  background-color: var(--color-background);
  overflow: hidden;
  image-rendering: pixelated;
  display: flex;
  flex-direction: column;
}

/* === Header === */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-sm) var(--space-md);
  border-bottom: var(--border-width) solid var(--border-color);
  background: var(--color-surface);
  flex-shrink: 0;
}
.header h1 { font-size: 14px; font-weight: 900; color: var(--color-primary); }
.header .gear { font-size: 18px; }

/* === Main Layout: 2-column === */
.main-layout {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* === Left Panel: Timer === */
.left-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: var(--space-md);
  gap: var(--space-md);
  border-right: var(--border-width) solid var(--border-color);
  overflow-y: auto;
}

/* === Right Panel: Character + Stats === */
.right-panel {
  width: 280px;
  display: flex;
  flex-direction: column;
  padding: var(--space-md);
  gap: var(--space-md);
  background: var(--color-surface-container-low);
  overflow-y: auto;
}

/* === Pixel Card === */
.pixel-card {
  position: relative;
  background: var(--color-surface-container-lowest);
  border: var(--border-width) solid var(--border-color);
  box-shadow: 4px 4px 0 0 var(--color-on-background);
  padding: var(--space-md);
}
.pixel-card__title {
  position: absolute;
  top: -12px;
  left: 12px;
  background: var(--color-surface-container-lowest);
  padding: 2px var(--space-xs);
  font-family: var(--font-pixel);
  font-size: var(--fs-label-caps);
  line-height: var(--lh-label-caps);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  border: var(--border-width) solid var(--border-color);
  z-index: 1;
}

/* === Pixel Button === */
.pixel-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-xs);
  padding: var(--space-sm) var(--space-md);
  font-family: var(--font-pixel);
  font-size: var(--fs-body-base);
  font-weight: 700;
  line-height: var(--lh-body-base);
  color: var(--color-on-background);
  background: var(--color-surface);
  border: var(--border-width) solid var(--border-color);
  box-shadow: 4px 4px 0 0 var(--color-on-background);
  cursor: pointer;
  text-transform: uppercase;
  user-select: none;
}
.pixel-btn--primary {
  color: var(--color-on-primary);
  background: var(--color-primary);
  box-shadow: 4px 4px 0 0 rgba(0,0,0,0.3);
}
.pixel-btn--primary:hover {
  background: var(--color-primary-container);
}

/* === Speech Bubble === */
.pixel-balloon {
  position: relative;
  background: var(--color-surface-container-lowest);
  border: var(--border-width) solid var(--border-color);
  padding: var(--space-sm) var(--space-md);
  font-size: var(--fs-body-base);
  line-height: var(--lh-body-base);
}
.pixel-balloon::after {
  content: '';
  position: absolute;
  bottom: -16px;
  left: 24px;
  border-width: 16px 16px 0;
  border-style: solid;
  border-color: var(--border-color) transparent transparent transparent;
}
.pixel-balloon::before {
  content: '';
  position: absolute;
  bottom: -10px;
  left: 28px;
  border-width: 12px 12px 0;
  border-style: solid;
  border-color: var(--color-surface-container-lowest) transparent transparent transparent;
  z-index: 1;
}

/* === Luffy Area === */
.luffy-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-md);
}
.luffy-sprite {
  width: 96px;
  height: 96px;
  border: var(--border-width) solid var(--border-color);
  background: var(--color-surface);
  image-rendering: pixelated;
  animation: sprite-bob 1s infinite steps(2);
}
@keyframes sprite-bob {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

/* === Progress Bar === */
.pixel-progress {
  width: 100%;
  height: 20px;
  background: var(--color-surface-container);
  border: var(--border-width) solid var(--border-color);
  overflow: hidden;
}
.pixel-progress__fill {
  height: 100%;
  width: 0%;
  background-image: repeating-linear-gradient(
    45deg,
    var(--color-primary-container) 0,
    var(--color-primary-container) 4px,
    var(--color-primary) 4px,
    var(--color-primary) 8px
  );
  transition: width 0.3s steps(10);
}

/* === Timer Display === */
.timer-digit {
  font-size: 48px;
  line-height: 1;
  letter-spacing: 4px;
}
.timer-label {
  font-size: var(--fs-label-caps);
  line-height: var(--lh-label-caps);
  text-transform: uppercase;
  color: var(--color-on-surface-variant);
  letter-spacing: 0.05em;
}

/* === Quick Stats === */
.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: var(--space-sm);
}
.stat-item {
  text-align: center;
  background: var(--color-surface-container-lowest);
  border: var(--border-width) solid var(--border-color);
  padding: var(--space-sm);
}
.stat-value {
  font-size: 18px;
  font-weight: 700;
  color: var(--color-primary);
}
.stat-label {
  font-size: 7px;
  text-transform: uppercase;
  color: var(--color-on-surface-variant);
  margin-top: 2px;
}

/* === Bottom Nav === */
.pixel-nav {
  display: flex;
  justify-content: space-around;
  border-top: var(--border-width) solid var(--border-color);
  background: var(--color-surface-container);
  flex-shrink: 0;
}
.pixel-nav__tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: var(--space-xs) var(--space-sm);
  font-family: var(--font-pixel);
  font-size: 8px;
  color: var(--color-on-surface-variant);
  background: none;
  border: none;
  border-bottom: 4px solid transparent;
  cursor: default;
}
.pixel-nav__tab--active {
  color: var(--color-primary);
  border-bottom-color: var(--color-primary);
}
.pixel-nav__tab-icon { font-size: 16px; }

/* === Template pill === */
.template-pill {
  display: inline-block;
  font-size: 7px;
  text-transform: uppercase;
  padding: 2px 6px;
  background: var(--color-primary);
  color: white;
  border: 2px solid var(--border-color);
  letter-spacing: 0.05em;
}

.text-label-caps {
  font-family: var(--font-pixel);
  font-size: var(--fs-label-caps);
  line-height: var(--lh-label-caps);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.text-primary { color: var(--color-primary); }
.text-on-surface-variant { color: var(--color-on-surface-variant); }
.text-success { color: var(--color-success); }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <h1>LUFFY FOCUS</h1>
  <span class="gear">⚙</span>
</header>

<!-- Main 2-Column Layout -->
<div class="main-layout">

  <!-- LEFT: Timer -->
  <div class="left-panel">

    <!-- Template indicator -->
    <div style="text-align:center;">
      <span class="template-pill">CODING SPRINT</span>
    </div>

    <!-- Timer Card -->
    <div class="pixel-card" style="text-align:center; padding: var(--space-lg) var(--space-md);">
      <div class="pixel-card__title">POMODORO</div>
      <div class="timer-digit" style="margin-top:8px;">25:00</div>
      <div class="timer-label" style="margin-top:4px;">FOCUS TIME</div>
    </div>

    <!-- Buttons -->
    <div style="display:flex; flex-direction:column; gap: var(--space-sm);">
      <button class="pixel-btn pixel-btn--primary" style="width:100%; padding: var(--space-md); font-size: 14px;">START</button>
      <button class="pixel-btn" disabled style="width:100%; padding: var(--space-sm);">RESET</button>
    </div>

    <!-- Progress -->
    <div style="margin-top:auto; padding-top: var(--space-md);">
      <div style="border-top: 4px dotted var(--color-on-background); padding-top: var(--space-sm);">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 4px;">
          <span class="text-label-caps">DAILY GOAL</span>
          <span class="text-label-caps">0/8</span>
        </div>
        <div class="pixel-progress">
          <div class="pixel-progress__fill" style="width:0%;"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT: Character + Mini Stats -->
  <div class="right-panel">

    <!-- Luffy Mascot -->
    <div class="luffy-area" style="flex:1; justify-content:center;">
      <svg class="luffy-sprite" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
        <rect width="64" height="64" fill="#f7f9ff"/>
        <rect x="8" y="26" width="48" height="8" fill="#fcbc0b"/>
        <rect x="8" y="26" width="48" height="2" fill="#7a5900"/>
        <rect x="20" y="12" width="24" height="16" fill="#fcbc0b"/>
        <rect x="20" y="26" width="24" height="2" fill="#7a5900"/>
        <rect x="20" y="22" width="24" height="6" fill="#e41000"/>
        <rect x="20" y="34" width="24" height="18" fill="#ffcc99"/>
        <rect x="26" y="38" width="6" height="6" fill="#181c20"/>
        <rect x="34" y="38" width="6" height="6" fill="#181c20"/>
        <rect x="26" y="46" width="14" height="4" fill="#181c20"/>
        <rect x="28" y="44" width="10" height="4" fill="#181c20"/>
        <rect x="16" y="32" width="6" height="6" fill="#181c20"/>
        <rect x="20" y="30" width="4" height="6" fill="#181c20"/>
        <rect x="40" y="30" width="4" height="4" fill="#181c20"/>
        <rect x="42" y="32" width="6" height="8" fill="#181c20"/>
      </svg>

      <div class="pixel-balloon" style="width:100%; text-align:center;">
        <span style="font-size:10px;">Let's get to work, Captain!</span>
      </div>
    </div>

    <!-- Quick Stats -->
    <div>
      <span class="text-label-caps text-on-surface-variant" style="display:block; margin-bottom:4px;">VOYAGE LOG</span>
      <div class="stat-grid">
        <div class="stat-item">
          <div class="stat-value">0</div>
          <div class="stat-label">TODAY</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">0h</div>
          <div class="stat-label">FOCUS</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">0</div>
          <div class="stat-label">STREAK</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Bottom Nav -->
<nav class="pixel-nav">
  <div class="pixel-nav__tab pixel-nav__tab--active">
    <span class="pixel-nav__tab-icon">⏱</span>
    <span>TIMER</span>
  </div>
  <div class="pixel-nav__tab">
    <span class="pixel-nav__tab-icon">📋</span>
    <span>TEMPLATES</span>
  </div>
  <div class="pixel-nav__tab">
    <span class="pixel-nav__tab-icon">📊</span>
    <span>STATS</span>
  </div>
</nav>

</body>
</html>
